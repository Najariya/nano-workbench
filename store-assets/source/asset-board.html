<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Local AI Workbench Store Assets</title>
  <style>
    @font-face {
      font-family: InterWB;
      src: url("../../fonts/inter-400.woff2") format("woff2");
      font-weight: 400;
    }
    @font-face {
      font-family: InterWB;
      src: url("../../fonts/inter-600.woff2") format("woff2");
      font-weight: 600;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 32px;
      font-family: InterWB, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f8fafc;
      background: #0f131b;
      letter-spacing: 0;
    }
    header {
      max-width: 1160px;
      margin: 0 auto 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.12;
    }
    p {
      margin: 0;
      color: #bac4d4;
      line-height: 1.55;
    }
    .grid {
      max-width: 1160px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
    }
    figure {
      margin: 0;
      overflow: hidden;
      border: 1px solid #2f3a4d;
      border-radius: 10px;
      background: #151b25;
      box-shadow: 0 18px 44px rgba(0, 0, 0, .28);
    }
    img {
      display: block;
      width: 100%;
      height: auto;
      background: #0b0f16;
    }
    figcaption {
      padding: 13px 15px;
      color: #dce4ef;
      font-size: 14px;
      font-weight: 600;
    }
    .tile {
      max-width: 440px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Local AI Workbench Store Assets</h1>
    <p>Final Chrome Web Store upload set generated from the real screenshots captured on June 25, 2026.</p>
  </header>
  <main class="grid">
    <figure>
      <img src="../screenshots/01-workbench-actions.png" alt="Real Chrome side-panel summary screenshot" />
      <figcaption>01 - Workbench summary in Chrome, 1280 x 800</figcaption>
    </figure>
    <figure>
      <img src="../screenshots/02-image-ocr-right-click.png" alt="Right-click image OCR workflow screenshot" />
      <figcaption>02 - Image OCR context-menu workflow: right-click image, extract text/fields, copy clean output, 1280 x 800</figcaption>
    </figure>
    <figure>
      <img src="../screenshots/03-model-setup.png" alt="On-device model setup screenshot" />
      <figcaption>03 - On-device model setup and ready states, 1280 x 800</figcaption>
    </figure>
    <figure>
      <img src="../screenshots/04-settings-safety.png" alt="Settings and site safety screenshot" />
      <figcaption>04 - Settings, safety, and persona controls, 1280 x 800</figcaption>
    </figure>
    <figure>
      <img src="../screenshots/05-model-download-context.png" alt="Model download card in Chrome screenshot" />
      <figcaption>05 - Model download in real Chrome context, 1280 x 800</figcaption>
    </figure>
    <figure class="tile">
      <img src="../promo/small-promo-tile-440x280.png" alt="Small promotional tile" />
      <figcaption>Small promotional tile, 440 x 280</figcaption>
    </figure>
  </main>
</body>
</html>
