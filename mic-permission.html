<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Enable microphone — Local AI Workbench</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117; color: #e6e8f0; display: grid; place-items: center; height: 100vh; margin: 0; }
    .card { max-width: 420px; text-align: center; padding: 28px; background: #161a23; border: 1px solid #262c40;
      border-radius: 18px; box-shadow: 0 8px 30px rgba(0,0,0,.45); }
    .logo { width: 52px; height: 52px; display: grid; place-items: center; border-radius: 14px; margin: 0 auto 14px;
      font-size: 24px; color: #14204a; background: linear-gradient(135deg, #818cf8, #c084fc); }
    h1 { font-size: 18px; margin: 0 0 8px; }
    p { font-size: 14px; line-height: 1.55; color: #9aa2b6; margin: 0 0 18px; }
    button { padding: 12px 22px; border: none; border-radius: 999px; font-size: 14px; font-weight: 700; cursor: pointer;
      color: #14204a; background: linear-gradient(135deg, #818cf8, #c084fc); }
    .status { margin-top: 16px; font-size: 13px; min-height: 20px; }
    .ok { color: #34d399; } .err { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">◈</div>
    <h1>Enable your microphone</h1>
    <p>Local AI Workbench needs one-time permission to use voice input.
       Click below and choose <strong>Allow</strong>. You can close this tab afterward —
       voice will then work in the side panel.</p>
    <button id="grant">Allow microphone</button>
    <div id="status" class="status"></div>
  </div>
  <script src="mic-permission.js"></script>
</body>
</html>
